<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>Loom Log</title>
<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#F5F7F6">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Loom Log">
<link rel="apple-touch-icon" href="/icon-192.png">
<link rel="icon" href="/icon-192.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#F5F7F6;
    --panel:#FFFFFF;
    --panel-2:#EFF3F1;
    --border:#D7DEDA;
    --text:#1B231F;
    --text-dim:#6B7A74;
    --amber:#B8822A;
    --teal:#0E9A70;
    --rust:#C1502E;
    --radius:8px;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  body{margin:0;background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;padding:14px;min-height:100vh;}
  .wrap{max-width:900px;margin:0 auto;}

  .header{display:flex;align-items:flex-start;justify-content:space-between;flex-wrap:wrap;gap:10px;margin-bottom:16px;border-bottom:1px solid var(--border);padding-bottom:14px;}
  .brand{font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:23px;letter-spacing:-0.02em;display:flex;align-items:center;gap:9px;}
  .brand .spool{width:20px;height:20px;border-radius:50%;border:3px solid var(--teal);border-top-color:var(--amber);display:inline-block;flex-shrink:0;}
  .subtitle{font-size:11.5px;color:var(--text-dim);font-family:'IBM Plex Mono',monospace;margin-top:4px;line-height:1.5;}
  button.export-btn{background:transparent;border:1px solid var(--border);color:var(--text-dim);padding:10px 14px;border-radius:6px;font-size:12.5px;cursor:pointer;font-family:'Inter',sans-serif;min-height:40px;}

  .tabs{display:flex;gap:7px;margin-bottom:12px;overflow-x:auto;-webkit-overflow-scrolling:touch;padding-bottom:2px;}
  .tab{position:relative;flex-shrink:0;padding:10px 14px 9px;background:var(--panel);border:1px solid var(--border);border-radius:var(--radius);cursor:pointer;font-family:'Space Grotesk',sans-serif;font-weight:600;font-size:13.5px;color:var(--text-dim);white-space:nowrap;display:flex;align-items:center;}
  .tab::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:var(--border);}
  .tab.active{color:var(--text);background:var(--panel-2);border-color:var(--teal);}
  .tab.status-good::before{background:var(--teal);}
  .tab.status-warn::before{background:var(--amber);}
  .tab.status-bad::before{background:var(--rust);}
  .tab .rm{margin-left:9px;color:var(--text-dim);font-size:13px;padding:2px;}
  .tab .rm:hover{color:var(--rust);}
  .add-line{flex-shrink:0;padding:10px 14px;background:transparent;border:1px dashed var(--border);border-radius:var(--radius);color:var(--text-dim);cursor:pointer;font-size:13px;white-space:nowrap;}
  .add-line:hover{border-color:var(--teal);color:var(--teal);}

  .nav-bar{display:flex;gap:10px;align-items:flex-end;margin-bottom:10px;flex-wrap:wrap;}
  .day-field{flex:1;min-width:140px;}
  .day-field label{margin-bottom:5px;}
  .save-btn{background:var(--teal);color:#1B1D1F;border:none;border-radius:6px;padding:0 18px;min-height:44px;font-family:'Space Grotesk',sans-serif;font-weight:600;font-size:13px;cursor:pointer;white-space:nowrap;}
  .save-btn.saved{background:var(--panel-2);color:var(--teal);border:1px solid var(--teal);}
  .save-btn:disabled{opacity:.75;cursor:not-allowed;}
  .nav-label{font-size:10px;color:var(--text-dim);text-transform:uppercase;letter-spacing:0.07em;margin:2px 2px 5px;font-family:'Space Grotesk',sans-serif;}

  /* Sub navigation */
  .subtabs{display:flex;gap:4px;background:var(--panel);border:1px solid var(--border);border-radius:var(--radius);padding:4px;margin-bottom:14px;}
  .subtab{flex:1;text-align:center;padding:9px 6px;border-radius:5px;background:transparent;border:none;color:var(--text-dim);font-family:'Space Grotesk',sans-serif;font-weight:600;font-size:12.5px;cursor:pointer;}
  .subtab.active{background:var(--teal);color:#1B1D1F;}
  .tabpanel{display:none;}
  .tabpanel.active{display:block;}

  .panel{background:var(--panel);border:1px solid var(--border);border-radius:var(--radius);padding:16px;margin-bottom:14px;}
  .panel h2{font-family:'Space Grotesk',sans-serif;font-size:12.5px;text-transform:uppercase;letter-spacing:0.08em;color:var(--text-dim);margin:0 0 13px;display:flex;align-items:center;gap:8px;}
  .panel h2::after{content:'';flex:1;height:1px;background:var(--border);}
  .panel h2 .hint{text-transform:none;letter-spacing:0;font-family:'Inter',sans-serif;font-size:11px;opacity:.7;}

  .grid{display:grid;gap:11px;}
  .grid.cfg{grid-template-columns:repeat(auto-fit,minmax(120px,1fr));align-items:end;}
  .grid.entry{grid-template-columns:1fr 1fr;}
  @media(min-width:520px){ .grid.entry{grid-template-columns:repeat(4,1fr);} }

  label{display:block;font-size:10.5px;color:var(--text-dim);text-transform:uppercase;letter-spacing:0.05em;margin-bottom:5px;}
  input,select{width:100%;background:var(--panel-2);border:1px solid var(--border);color:var(--text);padding:11px 10px;border-radius:5px;font-family:'IBM Plex Mono',monospace;font-size:15px;min-height:44px;}
  select{font-family:'Inter',sans-serif;font-size:14px;}
  input:focus,select:focus{outline:none;border-color:var(--teal);}
  input::placeholder{color:#5c5f61;font-size:13px;}
  input[readonly]{opacity:.75;cursor:not-allowed;}

  .field-full{grid-column:1/-1;}
  .quickset{display:flex;gap:6px;margin-top:6px;}
  .quickset button{flex:1;background:var(--panel-2);border:1px solid var(--border);color:var(--text-dim);padding:7px 4px;border-radius:4px;font-size:11px;cursor:pointer;font-family:'IBM Plex Mono',monospace;}
  .quickset button:hover{border-color:var(--teal);color:var(--teal);}

  .reason-row{display:flex;gap:7px;}
  .reason-row select{flex:1;}
  .reason-row button{flex-shrink:0;background:var(--panel-2);border:1px solid var(--border);color:var(--text-dim);padding:0 14px;border-radius:5px;font-size:18px;cursor:pointer;min-height:44px;}
  .reason-row button:hover{border-color:var(--teal);color:var(--teal);}
  .new-reason-box{display:none;gap:7px;margin-top:8px;}
  .new-reason-box.show{display:flex;}
  .new-reason-box input{flex:1;}
  .new-reason-box button{flex-shrink:0;background:var(--teal);color:#1B1D1F;border:none;border-radius:5px;padding:0 16px;font-weight:600;font-size:13px;cursor:pointer;min-height:44px;}

  .preview{margin-top:12px;padding:10px 12px;background:var(--panel-2);border-radius:5px;font-family:'IBM Plex Mono',monospace;font-size:12px;color:var(--text-dim);display:flex;flex-wrap:wrap;gap:12px;}
  .preview b{color:var(--text);}

  button.primary{background:var(--teal);color:#1B1D1F;border:none;padding:13px 18px;border-radius:6px;font-family:'Space Grotesk',sans-serif;font-weight:600;font-size:14px;cursor:pointer;width:100%;min-height:46px;margin-top:12px;}
  button.primary:hover{background:#f2b458;}
  button.secondary{background:var(--panel-2);color:var(--text);border:1px solid var(--border);padding:10px 14px;border-radius:6px;font-family:'Inter',sans-serif;font-weight:600;font-size:13px;cursor:pointer;min-height:42px;}
  button.secondary:hover{border-color:var(--teal);}
  button.danger-ghost{background:transparent;border:1px solid var(--border);color:var(--rust);padding:8px 12px;border-radius:5px;font-size:12px;cursor:pointer;}

  .summary{display:grid;grid-template-columns:repeat(2,1fr);gap:9px;margin-bottom:14px;}
  @media(min-width:600px){ .summary{grid-template-columns:repeat(4,1fr);} }
  .card{background:var(--panel);border:1px solid var(--border);border-radius:var(--radius);padding:12px 14px;}
  .card .label{font-size:9.5px;text-transform:uppercase;letter-spacing:0.06em;color:var(--text-dim);margin-bottom:5px;}
  .card .value{font-family:'IBM Plex Mono',monospace;font-size:19px;font-weight:600;}
  .card .value.teal{color:var(--teal);}
  .card .value.amber{color:var(--amber);}
  .card .value.rust{color:var(--rust);}

  .dt-row{display:flex;align-items:center;gap:8px;margin-bottom:8px;font-size:11.5px;}
  .dt-row .name{width:130px;color:var(--text-dim);flex-shrink:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .dt-row .bar-bg{flex:1;height:8px;background:var(--panel-2);border-radius:4px;overflow:hidden;}
  .dt-row .bar-fill{height:100%;background:var(--rust);}
  .dt-row .mins{width:50px;text-align:right;font-family:'IBM Plex Mono',monospace;color:var(--text-dim);flex-shrink:0;}

  .toolbar{display:flex;justify-content:space-between;align-items:center;margin-bottom:4px;}
  .count{font-size:11px;color:var(--text-dim);font-family:'IBM Plex Mono',monospace;}

  .entry-card{padding:12px 4px;border-bottom:1px solid var(--panel-2);}
  .entry-card:last-child{border-bottom:none;}
  .ec-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;}
  .ec-time{font-family:'Space Grotesk',sans-serif;font-weight:600;font-size:14px;}
  .ec-date{color:var(--text-dim);font-size:11px;font-family:'IBM Plex Mono',monospace;margin-left:6px;}
  .ec-pills{display:flex;gap:5px;}
  .eff-pill{padding:3px 8px;border-radius:20px;font-size:11px;font-weight:600;font-family:'IBM Plex Mono',monospace;}
  .eff-pill.good{background:rgba(31,170,124,0.15);color:var(--teal);}
  .eff-pill.warn{background:rgba(217,164,65,0.15);color:var(--amber);}
  .eff-pill.bad{background:rgba(193,80,46,0.15);color:var(--rust);}
  .del-btn{background:none;border:none;color:var(--text-dim);cursor:pointer;font-size:16px;padding:4px 8px;}
  .del-btn:hover{color:var(--rust);}
  .ec-metrics{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:6px;}
  @media(min-width:480px){ .ec-metrics{grid-template-columns:repeat(7,1fr);} }
  .ec-metric .l{font-size:9px;text-transform:uppercase;color:var(--text-dim);letter-spacing:0.04em;}
  .ec-metric .v{font-family:'IBM Plex Mono',monospace;font-size:13px;}
  .ec-reason{font-size:11.5px;color:var(--amber);margin-top:2px;}
  .ec-notes{font-size:11.5px;color:var(--text-dim);margin-top:2px;font-style:italic;}
  .empty{color:var(--text-dim);font-size:12px;padding:24px 0;text-align:center;font-family:'IBM Plex Mono',monospace;}
  .empty-sm{color:var(--text-dim);font-size:11.5px;padding:10px 0;font-family:'IBM Plex Mono',monospace;}

  .chart-svg{width:100%;height:auto;display:block;}
  .chart-legend{display:flex;gap:16px;margin-bottom:10px;font-size:11px;color:var(--text-dim);font-family:'IBM Plex Mono',monospace;}
  .chart-legend .dot{display:inline-block;width:9px;height:9px;border-radius:50%;margin-right:5px;vertical-align:middle;}

  /* Time Study */
  .style-tabs{display:flex;gap:6px;overflow-x:auto;margin-bottom:12px;-webkit-overflow-scrolling:touch;}
  .style-chip{flex-shrink:0;padding:8px 13px;background:var(--panel-2);border:1px solid var(--border);border-radius:20px;font-size:12.5px;color:var(--text-dim);cursor:pointer;white-space:nowrap;display:flex;align-items:center;gap:6px;}
  .style-chip.active{background:var(--teal);color:#1B1D1F;border-color:var(--teal);font-weight:600;}
  .style-chip .rm{opacity:.6;}
  .style-chip .rm:hover{opacity:1;}
  .add-chip{flex-shrink:0;padding:8px 13px;border-radius:20px;border:1px dashed var(--border);background:transparent;color:var(--text-dim);font-size:12.5px;cursor:pointer;white-space:nowrap;}
  .add-chip:hover{border-color:var(--teal);color:var(--teal);}

  .output-banner{background:linear-gradient(135deg,rgba(31,170,124,.14),rgba(217,164,65,.08));border:1px solid var(--border);border-radius:var(--radius);padding:14px 16px;margin-bottom:14px;}
  .output-banner .l{font-size:10px;text-transform:uppercase;letter-spacing:0.06em;color:var(--text-dim);margin-bottom:4px;}
  .output-banner .v{font-family:'Space Grotesk',sans-serif;font-size:24px;font-weight:700;color:var(--teal);}
  .output-banner .v span{font-size:13px;color:var(--text-dim);font-weight:500;font-family:'Inter',sans-serif;}
  .output-banner .via{font-size:11px;color:var(--text-dim);margin-top:3px;font-family:'IBM Plex Mono',monospace;}

  .process-card{background:var(--panel-2);border:1px solid var(--border);border-radius:var(--radius);padding:14px;margin-bottom:10px;}
  .process-card.selected{border-color:var(--teal);}
  .pc-top{display:flex;justify-content:space-between;align-items:flex-start;gap:8px;margin-bottom:8px;}
  .pc-name{font-family:'Space Grotesk',sans-serif;font-weight:600;font-size:14.5px;}
  .pc-stats{display:flex;flex-wrap:wrap;gap:14px;margin:8px 0;font-family:'IBM Plex Mono',monospace;font-size:12px;color:var(--text-dim);}
  .pc-stats b{color:var(--text);font-size:13.5px;}
  .pc-actions{display:flex;gap:8px;flex-wrap:wrap;margin-top:10px;}
  .pc-actions button{flex:1;min-width:110px;}
  .use-toggle{display:flex;align-items:center;gap:7px;font-size:12px;color:var(--text-dim);cursor:pointer;padding:8px 10px;background:var(--panel);border:1px solid var(--border);border-radius:6px;}
  .use-toggle.active{border-color:var(--teal);color:var(--teal);}
  .use-toggle input{width:auto;min-height:auto;}

  .timer-box{background:var(--panel);border:1px solid var(--teal);border-radius:var(--radius);padding:16px;margin-top:10px;}
  .timer-display{text-align:center;padding:18px 0;}
  .timer-display .t{font-family:'IBM Plex Mono',monospace;font-size:48px;font-weight:600;color:var(--teal);letter-spacing:0.02em;}
  .timer-display .l{font-size:10.5px;color:var(--text-dim);text-transform:uppercase;letter-spacing:0.08em;margin-top:2px;}
  .timer-controls{display:flex;gap:8px;margin-bottom:14px;}
  .timer-controls button{flex:1;}
  .btn-start{background:var(--teal);color:#12201f;border:none;border-radius:6px;font-weight:600;min-height:48px;font-family:'Space Grotesk',sans-serif;cursor:pointer;}
  .btn-lap{background:var(--amber);color:#1B1D1F;border:none;border-radius:6px;font-weight:600;min-height:48px;font-family:'Space Grotesk',sans-serif;cursor:pointer;}
  .btn-lap:disabled{opacity:.4;cursor:not-allowed;}
  .btn-stop{background:transparent;border:1px solid var(--rust);color:var(--rust);border-radius:6px;font-weight:600;min-height:48px;cursor:pointer;}

  .readings-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:6px;margin-bottom:12px;}
  .reading-chip{background:var(--panel-2);border:1px solid var(--border);border-radius:6px;padding:8px 4px;text-align:center;cursor:pointer;}
  .reading-chip .n{font-size:9px;color:var(--text-dim);}
  .reading-chip .s{font-family:'IBM Plex Mono',monospace;font-size:13px;font-weight:600;}
  .reading-chip.kept{border-color:var(--teal);}
  .reading-chip.kept .s{color:var(--teal);}
  .reading-chip.outlier{border-color:var(--rust);}
  .reading-chip.outlier .s{color:var(--rust);}
  .reading-chip .tag{font-size:8px;margin-top:2px;color:var(--text-dim);}

  .ts-config{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px;}
  .running-avg{font-family:'IBM Plex Mono',monospace;font-size:12px;color:var(--text-dim);text-align:center;margin-bottom:10px;}
  .running-avg b{color:var(--text);}
</style>
</head>
<body>
<div class="wrap">

  <div class="header">
    <div>
      <div class="brand"><span class="spool"></span>LOOM LOG</div>
      <div class="subtitle" id="subtitleLine">— loading —</div>
    </div>
    <button class="export-btn" id="exportBtn">Export CSV</button>
  </div>

  <div class="nav-bar">
    <div class="day-field"><label>Day</label><input id="dayPicker" type="date"></div>
    <button class="save-btn" id="saveBtn">💾 Save</button>
  </div>

  <div class="nav-label">Group</div>
  <div class="tabs" id="groupTabs"></div>

  <div class="nav-label">Line</div>
  <div class="tabs" id="tabs"></div>

  <div class="subtabs">
    <button class="subtab active" data-tab="dashboard">Dashboard</button>
    <button class="subtab" data-tab="hourly">Hourly Log</button>
    <button class="subtab" data-tab="timestudy">Time Study</button>
  </div>

  <!-- DASHBOARD -->
  <div class="tabpanel active" id="tab-dashboard">
    <div class="panel">
      <h2>Line Setup</h2>
      <div class="grid cfg">
        <div style="grid-column:1/-1;"><label>Line Name</label><input id="cfgName" placeholder="e.g. Sewing Line 3"></div>
        <div><label>Default Operators</label><input id="cfgManpower" type="number" min="0" placeholder="e.g. 24"></div>
        <div><label>Default SMV</label><input id="cfgSmv" type="number" step="0.01" min="0" placeholder="e.g. 0.85"></div>
        <div style="grid-column:1/-1;"><button class="primary" id="saveCfgBtn" style="margin-top:2px;">Save Config</button></div>
      </div>
    </div>
    <div class="summary" id="summary"></div>
    <div class="panel" id="dtPanel">
      <h2>Downtime Breakdown</h2>
      <div id="dtBreakdown"></div>
    </div>
    <div class="panel">
      <h2>Recent Entries <span class="hint" id="seeAllHint">tap Hourly Log for full history →</span></h2>
      <div id="recentList"></div>
    </div>
  </div>

  <!-- HOURLY LOG -->
  <div class="tabpanel" id="tab-hourly">
    <div class="panel">
      <h2>New Hourly Entry</h2>
      <div class="grid entry">
        <div><label>Time</label><input id="eTime" type="time"></div>
        <div>
          <label>Log Time (min)</label>
          <input id="eLogTime" type="number" min="1" value="60">
          <div class="quickset"><button type="button" data-val="60">60 min</button><button type="button" data-val="25">25 min</button></div>
        </div>
        <div><label>Operators</label><input id="eOperators" type="number" min="0"></div>
        <div><label>SMV</label><input id="eSmv" type="number" step="0.01" min="0"></div>
        <div><label>Target Production</label><input id="eTarget" type="number" min="0" placeholder="pcs"></div>
        <div><label>Actual Production</label><input id="eActual" type="number" min="0" placeholder="pcs"></div>
        <div><label>Lost Pieces <span style="opacity:.6;">(auto)</span></label><input id="eLostPieces" type="number" min="0" placeholder="0" readonly></div>
        <div class="field-full">
          <label>Downtime Reason</label>
          <div class="reason-row"><select id="eReason"></select><button type="button" id="newReasonToggle">+</button></div>
          <div class="new-reason-box" id="newReasonBox"><input id="newReasonInput" placeholder="Type new reason..."><button type="button" id="confirmReasonBtn">Add</button></div>
        </div>
        <div class="field-full"><label>Notes (optional)</label><input id="eNotes" placeholder="short note..."></div>
      </div>
      <div class="preview" id="preview"></div>
      <button class="primary" id="addEntryBtn">Add Entry</button>
    </div>
    <div class="panel" id="chartPanel">
      <h2>Hourly Output Curve <span class="hint" id="chartHint"></span></h2>
      <div id="outputChart"></div>
    </div>
    <div class="panel">
      <div class="toolbar"><h2 style="margin:0;">Entry Log</h2></div>
      <span class="count" id="entryCount"></span>
      <div id="logList"></div>
      <div class="empty" id="emptyMsg" style="display:none;">No entries yet — add your first hour above.</div>
    </div>
  </div>

  <!-- TIME STUDY -->
  <div class="tabpanel" id="tab-timestudy">
    <div class="panel">
      <h2>Style</h2>
      <div class="style-tabs" id="styleTabs"></div>
      <div id="styleContent"></div>
    </div>
  </div>

</div>

<script>
// Standalone storage shim backed by real browser localStorage (this app runs
// outside the Claude artifact host once deployed, so it uses its own persistence layer).
window.storage = {
  async get(key){
    const v = localStorage.getItem('loomlog:' + key);
    return v !== null ? { key, value: v } : null;
  },
  async set(key, value){
    localStorage.setItem('loomlog:' + key, value);
    return { key, value };
  },
  async delete(key){
    localStorage.removeItem('loomlog:' + key);
    return { key, deleted: true };
  },
  async list(prefix){
    const keys = Object.keys(localStorage)
      .filter(k => k.startsWith('loomlog:' + (prefix||'')))
      .map(k => k.replace('loomlog:',''));
    return { keys };
  }
};
</script>
<script>
const DEFAULT_REASONS = ['Machine Breakdown','Power Cut / No Electricity','Thread Break','Needle Break','Fabric / Material Shortage','Quality Issue / Rework','Style Changeover','No Operator / Absenteeism','Maintenance','Other'];
let state = { lines: [], groups: [], activeId: null, activeGroupId: null };
let ui = { subtab: 'dashboard', activeStyleId: null, openTimerProcessId: null, day: new Date().toISOString().slice(0,10) };
let timerSession = null; // { processId, tolerance, allowancePct, readings:[], running, startedAt, lastLapAt }
let timerInterval = null;

function uid(p){ return (p||'ID') + Date.now().toString(36) + Math.random().toString(36).slice(2,6); }
function defaultLine(name){ return { id: uid('L'), name: name||'Line 1', manpower:20, smv:1, customReasons:[], entries:[], styles:[] }; }
function defaultGroup(name, lineIds){ return { id: uid('G'), name: name||'Group 1', lineIds: lineIds||[] }; }
function dayEntries(line){ return line.entries.filter(e => e.date === ui.day); }
function activeGroup(){ return state.groups.find(g=>g.id===state.activeGroupId); }
function pickFirstLineInGroup(groupId){
  const g = state.groups.find(x=>x.id===groupId);
  if(!g || !g.lineIds.length) return state.lines[0] ? state.lines[0].id : null;
  const found = g.lineIds.find(id => state.lines.some(l=>l.id===id));
  return found || (state.lines[0] ? state.lines[0].id : null);
}

async function loadState(){
  try{
    // --- lines ---
    const lineIdx = await window.storage.get('lines-index');
    let lineIds = lineIdx ? JSON.parse(lineIdx.value) : [];
    let lines = [];
    for(const id of lineIds){ try{ const res = await window.storage.get('line:'+id); if(res) lines.push(JSON.parse(res.value)); }catch(e){} }
    if(!lines.length){ const l = defaultLine('Line 1'); lines = [l]; await persistLine(l); }
    lines.forEach(l => { if(!l.customReasons) l.customReasons=[]; if(!l.styles) l.styles=[]; });
    state.lines = lines;

    // --- groups ---
    const groupIdx = await window.storage.get('groups-index');
    let groupIds = groupIdx ? JSON.parse(groupIdx.value) : [];
    let groups = [];
    for(const id of groupIds){ try{ const res = await window.storage.get('group:'+id); if(res) groups.push(JSON.parse(res.value)); }catch(e){} }

    // reconcile: any line not claimed by a group gets parked somewhere safe (never lost)
    const referenced = new Set();
    groups.forEach(g => g.lineIds.forEach(id => referenced.add(id)));
    const orphanIds = state.lines.map(l=>l.id).filter(id => !referenced.has(id));
    if(!groups.length){
      const g = defaultGroup('Group 1', state.lines.map(l=>l.id));
      groups = [g];
      await persistGroup(g);
    } else if(orphanIds.length){
      let ungrouped = groups.find(g => g.name === 'Ungrouped');
      if(!ungrouped){ ungrouped = defaultGroup('Ungrouped', []); groups.push(ungrouped); }
      ungrouped.lineIds.push(...orphanIds);
      await persistGroup(ungrouped);
    }
    state.groups = groups;
    await persistGroupsIndex();
  }catch(e){
    console.error('Load failed', e);
    const l = defaultLine('Line 1'); const g = defaultGroup('Group 1', [l.id]);
    state.lines=[l]; state.groups=[g];
  }

  state.activeGroupId = state.groups[0] ? state.groups[0].id : null;
  state.activeId = pickFirstLineInGroup(state.activeGroupId);
  await restoreNavState();
  if(!state.lines.some(l=>l.id===state.activeId)) state.activeId = pickFirstLineInGroup(state.activeGroupId);

  ui.activeStyleId = activeLine() && activeLine().styles[0] ? activeLine().styles[0].id : null;
  syncEntryDefaults();
  render();
}
async function restoreNavState(){
  try{
    const res = await window.storage.get('nav-state');
    if(!res) return;
    const nav = JSON.parse(res.value);
    if(nav.activeGroupId && state.groups.find(g=>g.id===nav.activeGroupId)) state.activeGroupId = nav.activeGroupId;
    if(nav.activeId && state.lines.find(l=>l.id===nav.activeId)) state.activeId = nav.activeId;
    if(nav.day) ui.day = nav.day;
    if(nav.subtab) ui.subtab = nav.subtab;
  }catch(e){}
}
async function persistNavState(){
  try{ await window.storage.set('nav-state', JSON.stringify({activeGroupId: state.activeGroupId, activeId: state.activeId, day: ui.day, subtab: ui.subtab}), false); }catch(e){}
}
async function persistGroupsIndex(){ try{ await window.storage.set('groups-index', JSON.stringify(state.groups.map(g=>g.id)), false); }catch(e){} }
async function persistGroup(group){ try{ await window.storage.set('group:'+group.id, JSON.stringify(group), false); }catch(e){} }
async function deleteGroupStorage(id){ try{ await window.storage.delete('group:'+id, false); }catch(e){} }
async function persistIndex(){ try{ await window.storage.set('lines-index', JSON.stringify(state.lines.map(l=>l.id)), false); }catch(e){} }
async function persistLine(line){ try{ await window.storage.set('line:'+line.id, JSON.stringify(line), false); }catch(e){} }
async function deleteLineStorage(id){ try{ await window.storage.delete('line:'+id, false); }catch(e){} }
function activeLine(){ return state.lines.find(l=>l.id===state.activeId); }
function escapeHtml(s){ const d=document.createElement('div'); d.textContent=s; return d.innerHTML; }
function effColor(pct){ if(pct===null||pct===undefined) return ''; if(pct>=90) return 'good'; if(pct>=75) return 'warn'; return 'bad'; }
function lineStatusClass(line){ if(!line.entries.length) return ''; const last=[...line.entries].sort((a,b)=>(a.date+a.time).localeCompare(b.date+b.time)||a.createdAt-b.createdAt).pop(); const c=effColor(last.effSmv); return c==='good'?'status-good':c==='warn'?'status-warn':'status-bad'; }

/* ---------- Group tabs ---------- */
function renderGroupTabs(){
  const wrap = document.getElementById('groupTabs');
  wrap.innerHTML = '';
  state.groups.forEach(g => {
    const tab = document.createElement('div');
    tab.className = 'tab ' + (g.id===state.activeGroupId?'active':'');
    tab.innerHTML = `${escapeHtml(g.name)}<span class="rm" data-id="${g.id}">✕</span>`;
    tab.addEventListener('click', async (e) => {
      if(e.target.classList.contains('rm')) return;
      state.activeGroupId = g.id;
      state.activeId = pickFirstLineInGroup(g.id);
      ui.activeStyleId = activeLine() && activeLine().styles[0] ? activeLine().styles[0].id : null;
      syncEntryDefaults(); await persistNavState(); render();
    });
    tab.querySelector('.rm').addEventListener('click', async (e) => {
      e.stopPropagation();
      if(state.groups.length===1){ alert("Can't delete the last group."); return; }
      if(!confirm(`Delete group "${g.name}"? Its lines move to "Ungrouped" — no data is deleted.`)) return;
      let ungrouped = state.groups.find(x=>x.name==='Ungrouped' && x.id!==g.id);
      if(!ungrouped){ ungrouped = defaultGroup('Ungrouped', []); state.groups.push(ungrouped); }
      ungrouped.lineIds.push(...g.lineIds);
      state.groups = state.groups.filter(x=>x.id!==g.id);
      await deleteGroupStorage(g.id); await persistGroup(ungrouped); await persistGroupsIndex();
      if(state.activeGroupId===g.id){ state.activeGroupId = state.groups[0].id; state.activeId = pickFirstLineInGroup(state.activeGroupId); }
      syncEntryDefaults(); await persistNavState(); render();
    });
    wrap.appendChild(tab);
  });
  const addBtn = document.createElement('button');
  addBtn.className='add-line'; addBtn.textContent='+ Add Group';
  addBtn.addEventListener('click', async () => {
    const name = prompt('Group name (e.g. Group 1, Group 3):');
    if(!name || !name.trim()) return;
    const g = defaultGroup(name.trim(), []);
    state.groups.push(g);
    await persistGroup(g); await persistGroupsIndex();
    state.activeGroupId = g.id; state.activeId = null;
    syncEntryDefaults(); await persistNavState(); render();
  });
  wrap.appendChild(addBtn);
}

/* ---------- Line tabs (scoped to active group) ---------- */
function renderTabs(){
  const tabs = document.getElementById('tabs');
  tabs.innerHTML = '';
  const group = activeGroup();
  if(!group){ tabs.innerHTML = '<div class="empty-sm">Add a group above to get started.</div>'; return; }
  const groupLines = state.lines.filter(l => group.lineIds.includes(l.id));
  groupLines.forEach(line => {
    const tab = document.createElement('div');
    tab.className = 'tab ' + (line.id===state.activeId?'active ':'') + lineStatusClass(line);
    tab.innerHTML = `${escapeHtml(line.name)}<span class="rm" data-id="${line.id}">✕</span>`;
    tab.addEventListener('click', async (e) => {
      if(e.target.classList.contains('rm')) return;
      state.activeId=line.id; ui.activeStyleId = line.styles[0]?line.styles[0].id:null;
      syncEntryDefaults(); await persistNavState(); render();
    });
    tab.querySelector('.rm').addEventListener('click', async (e) => {
      e.stopPropagation();
      if(groupLines.length===1){ alert("Can't delete the last line in this group."); return; }
      if(!confirm(`Delete "${line.name}" and all its data?`)) return;
      await deleteLineStorage(line.id);
      state.lines = state.lines.filter(l=>l.id!==line.id);
      group.lineIds = group.lineIds.filter(id=>id!==line.id);
      await persistGroup(group); await persistIndex();
      if(state.activeId===line.id) state.activeId = pickFirstLineInGroup(group.id);
      syncEntryDefaults(); await persistNavState(); render();
    });
    tabs.appendChild(tab);
  });
  const addBtn = document.createElement('button');
  addBtn.className='add-line'; addBtn.textContent='+ Add Line';
  addBtn.addEventListener('click', async () => {
    const l = defaultLine('Line '+(state.lines.length+1));
    state.lines.push(l); group.lineIds.push(l.id);
    state.activeId=l.id; ui.activeStyleId=null;
    await persistLine(l); await persistIndex(); await persistGroup(group);
    syncEntryDefaults(); await persistNavState(); render();
  });
  tabs.appendChild(addBtn);
}

/* ---------- Hourly entry calc ---------- */
function calcFields(target,actual,lostPieces,logTime,operators,smv){
  const lostMinutes = target>0 ? (lostPieces/target)*logTime : 0;
  const downtime = lostPieces*smv;
  const effSmv = (logTime&&operators) ? (actual*smv)/(logTime*operators)*100 : null;
  const effTarget = target>0 ? (actual/target)*100 : null;
  const fttPct = actual>0 ? Math.max(0, Math.min(100, ((actual-lostPieces)/actual)*100)) : null;
  return {lostMinutes,downtime,effSmv,effTarget,fttPct};
}
function updateLostPieces(){
  const target=parseFloat(document.getElementById('eTarget').value)||0;
  const actual=parseFloat(document.getElementById('eActual').value)||0;
  const lostPieces = Math.max(target-actual,0);
  document.getElementById('eLostPieces').value = lostPieces;
  return lostPieces;
}
function updatePreview(){
  const line = activeLine();
  const target=parseFloat(document.getElementById('eTarget').value)||0;
  const actual=parseFloat(document.getElementById('eActual').value)||0;
  const lostPieces = updateLostPieces();
  const logTime=parseFloat(document.getElementById('eLogTime').value)||0;
  const operators=parseFloat(document.getElementById('eOperators').value)||0;
  const smv=parseFloat(document.getElementById('eSmv').value)||0;
  const {lostMinutes,downtime,effSmv,effTarget,fttPct} = calcFields(target,actual,lostPieces,logTime,operators,smv);
  const noLoss = lostPieces===0 && (target>0||actual>0);
  document.getElementById('preview').innerHTML = `
    ${noLoss ? `<span style="color:var(--teal);">✓ Target met — no loss this hour</span>` : `
    <span>Lost Min: <b>${lostMinutes.toFixed(1)}</b></span><span>Downtime: <b>${downtime.toFixed(1)} min</b></span>`}
    <span>Eff (SMV): <b>${effSmv!==null?effSmv.toFixed(1)+'%':'—'}</b></span>
    <span>Eff (Target): <b>${effTarget!==null?effTarget.toFixed(1)+'%':'—'}</b></span>
    <span>FTT%: <b>${fttPct!==null?fttPct.toFixed(1)+'%':'—'}</b></span>`;
}

/* ---------- Full log ---------- */
function catmullRomPath(pts){
  if(pts.length<2) return '';
  if(pts.length===2) return `M ${pts[0].x} ${pts[0].y} L ${pts[1].x} ${pts[1].y}`;
  let d = `M ${pts[0].x} ${pts[0].y}`;
  for(let i=0;i<pts.length-1;i++){
    const p0 = pts[i-1] || pts[i];
    const p1 = pts[i];
    const p2 = pts[i+1];
    const p3 = pts[i+2] || p2;
    const cp1x = p1.x + (p2.x-p0.x)/6, cp1y = p1.y + (p2.y-p0.y)/6;
    const cp2x = p2.x - (p3.x-p1.x)/6, cp2y = p2.y - (p3.y-p1.y)/6;
    d += ` C ${cp1x.toFixed(2)} ${cp1y.toFixed(2)}, ${cp2x.toFixed(2)} ${cp2y.toFixed(2)}, ${p2.x.toFixed(2)} ${p2.y.toFixed(2)}`;
  }
  return d;
}

function renderChart(){
  const line = activeLine();
  const container = document.getElementById('outputChart');
  const hint = document.getElementById('chartHint');
  if(!line){ container.innerHTML=''; hint.textContent=''; return; }
  const entries = dayEntries(line).slice().sort((a,b)=>a.time.localeCompare(b.time));
  if(entries.length<2){
    container.innerHTML = `<div class="empty-sm">Need at least 2 entries on ${ui.day} to plot a curve.</div>`;
    hint.textContent = '';
    return;
  }
  hint.textContent = `${entries.length} points — ${ui.day}`;

  const W=600, H=220, padL=38, padR=12, padT=12, padB=26;
  const innerW = W-padL-padR, innerH = H-padT-padB;
  const maxVal = Math.max(1, ...entries.map(e=>Math.max(e.target,e.actual)));
  const n = entries.length;
  const xFor = i => padL + (n===1 ? innerW/2 : innerW*i/(n-1));
  const yFor = v => padT + innerH - (v/maxVal)*innerH;

  const actualPts = entries.map((e,i)=>({x:xFor(i), y:yFor(e.actual)}));
  const targetPts = entries.map((e,i)=>({x:xFor(i), y:yFor(e.target)}));
  const actualPath = catmullRomPath(actualPts);
  const targetPath = catmullRomPath(targetPts);

  const gridLines = [0,0.5,1].map(f => {
    const y = padT + innerH*(1-f);
    const val = Math.round(maxVal*f);
    return `<line x1="${padL}" y1="${y}" x2="${W-padR}" y2="${y}" stroke="var(--border)" stroke-width="1"/>
      <text x="${padL-6}" y="${y+3}" text-anchor="end" font-size="9" fill="var(--text-dim)" font-family="IBM Plex Mono, monospace">${val}</text>`;
  }).join('');

  const step = Math.max(1, Math.ceil(n/8));
  const xLabels = entries.map((e,i)=> (i%step===0 || i===n-1)
    ? `<text x="${xFor(i)}" y="${H-8}" text-anchor="middle" font-size="9" fill="var(--text-dim)" font-family="IBM Plex Mono, monospace">${e.time}</text>` : '').join('');

  const dots = actualPts.map((p,i) => {
    const e = entries[i];
    const tier = effColor(e.effTarget);
    const c = tier==='good' ? 'var(--teal)' : tier==='warn' ? 'var(--amber)' : tier==='bad' ? 'var(--rust)' : 'var(--text-dim)';
    return `<circle cx="${p.x.toFixed(2)}" cy="${p.y.toFixed(2)}" r="3.2" fill="${c}" stroke="var(--panel)" stroke-width="1.5"><title>${e.time} — Actual ${e.actual}, Target ${e.target}</title></circle>`;
  }).join('');

  container.innerHTML = `
    <div class="chart-legend">
      <span><span class="dot" style="background:var(--teal);"></span>Actual pcs</span>
      <span><span class="dot" style="background:var(--text-dim);opacity:.6;"></span>Target pcs (dashed)</span>
    </div>
    <svg class="chart-svg" viewBox="0 0 ${W} ${H}" preserveAspectRatio="xMidYMid meet">
      ${gridLines}
      <path d="${targetPath}" fill="none" stroke="var(--text-dim)" stroke-width="1.5" stroke-dasharray="4,3" opacity="0.6"/>
      <path d="${actualPath}" fill="none" stroke="var(--teal)" stroke-width="2.5"/>
      ${dots}
      ${xLabels}
    </svg>`;
}

function renderLog(){
  const line = activeLine(); const list = document.getElementById('logList'); const empty = document.getElementById('emptyMsg');
  if(!line){ list.innerHTML=''; document.getElementById('entryCount').textContent=''; empty.style.display='block'; empty.textContent='Add a line in this group to start logging.'; return; }
  const sorted = dayEntries(line).sort((a,b)=>(b.date+b.time).localeCompare(a.date+a.time)||b.createdAt-a.createdAt);
  document.getElementById('entryCount').textContent = `${sorted.length} entr${sorted.length===1?'y':'ies'} on ${ui.day} · ${line.entries.length} total for this line`;
  if(!sorted.length){ list.innerHTML=''; empty.style.display='block'; empty.textContent='No entries for this day yet — add your first hour above.'; return; }
  empty.style.display='none';
  list.innerHTML = sorted.map(e => `
    <div class="entry-card">
      <div class="ec-top">
        <div><span class="ec-time">${e.time||'—'}</span><span class="ec-date">${e.date||''}</span></div>
        <div style="display:flex;align-items:center;gap:4px;">
          <div class="ec-pills">
            ${e.effSmv!==null?`<span class="eff-pill ${effColor(e.effSmv)}">${e.effSmv.toFixed(1)}%</span>`:''}
            ${e.effTarget!==null?`<span class="eff-pill ${effColor(e.effTarget)}">${e.effTarget.toFixed(1)}%</span>`:''}
          </div>
          <button class="del-btn" data-id="${e.id}">✕</button>
        </div>
      </div>
      <div class="ec-metrics">
        <div class="ec-metric"><div class="l">Target</div><div class="v">${e.target}</div></div>
        <div class="ec-metric"><div class="l">Actual</div><div class="v">${e.actual}</div></div>
        <div class="ec-metric"><div class="l">Lost Pcs</div><div class="v">${e.lostPieces>0?e.lostPieces:'—'}</div></div>
        <div class="ec-metric"><div class="l">Lost Min</div><div class="v">${e.lostMinutes>0?e.lostMinutes.toFixed(1):'—'}</div></div>
        <div class="ec-metric"><div class="l">Downtime</div><div class="v">${e.downtime>0?e.downtime.toFixed(1):'—'}</div></div>
        <div class="ec-metric"><div class="l">Ops / SMV</div><div class="v">${e.operators}/${e.smv}</div></div>
        <div class="ec-metric"><div class="l">FTT%</div><div class="v">${e.fttPct!==null&&e.fttPct!==undefined?e.fttPct.toFixed(1)+'%':'—'}</div></div>
      </div>
      ${e.reason?`<div class="ec-reason">⚠ ${escapeHtml(e.reason)}</div>`:''}
      ${e.notes?`<div class="ec-notes">${escapeHtml(e.notes)}</div>`:''}
    </div>`).join('');
  list.querySelectorAll('.del-btn').forEach(btn => btn.addEventListener('click', async () => {
    const line = activeLine(); line.entries = line.entries.filter(e=>e.id!==btn.dataset.id);
    await persistLine(line); render();
  }));
}

document.getElementById('exportBtn').addEventListener('click', () => {
  const line = activeLine();
  if(!line || !line.entries.length){ alert('No entries to export yet.'); return; }
  const headers = ['Date','Time','Log Time (min)','Operators','SMV','Target','Actual','Lost Pieces','Lost Minutes','Downtime (min)','Reason','Notes','Eff SMV %','Eff Target %','FTT %'];
  const rows = [...line.entries].sort((a,b)=>(a.date+a.time).localeCompare(b.date+b.time)).map(e => [
    e.date,e.time,e.logTime,e.operators,e.smv,e.target,e.actual,e.lostPieces,e.lostMinutes.toFixed(2),e.downtime.toFixed(2),
    `"${(e.reason||'').replace(/"/g,'""')}"`,`"${(e.notes||'').replace(/"/g,'""')}"`,
    e.effSmv!==null?e.effSmv.toFixed(2):'', e.effTarget!==null?e.effTarget.toFixed(2):'',
    (e.fttPct!==null&&e.fttPct!==undefined)?e.fttPct.toFixed(2):''
  ]);
  const csv = [headers.join(','), ...rows.map(r=>r.join(','))].join('\n');
  const blob = new Blob([csv],{type:'text/csv'}); const url = URL.createObjectURL(blob);
  const a = document.createElement('a'); a.href=url; a.download=`${line.name.replace(/\s+/g,'_')}_log.csv`; a.click(); URL.revokeObjectURL(url);
});

/* ================= TIME STUDY ================= */
function activeStyle(){ const line = activeLine(); return line ? line.styles.find(s=>s.id===ui.activeStyleId) : null; }

function renderTimeStudy(){
  const line = activeLine();
  const styleTabs = document.getElementById('styleTabs');
  if(!line){ styleTabs.innerHTML=''; document.getElementById('styleContent').innerHTML = '<div class="empty">Add a line in this group first.</div>'; return; }
  if(!line.styles.length){ ui.activeStyleId = null; }
  else if(!line.styles.find(s=>s.id===ui.activeStyleId)){ ui.activeStyleId = line.styles[0].id; }

  styleTabs.innerHTML = line.styles.map(s => `
    <div class="style-chip ${s.id===ui.activeStyleId?'active':''}" data-id="${s.id}">
      ${escapeHtml(s.name)}<span class="rm" data-rm="${s.id}">✕</span>
    </div>`).join('') + `<button class="add-chip" id="addStyleBtn">+ Add Style</button>`;

  styleTabs.querySelectorAll('.style-chip').forEach(chip => {
    chip.addEventListener('click', (e) => { if(e.target.dataset.rm) return; ui.activeStyleId = chip.dataset.id; ui.openTimerProcessId=null; renderTimeStudy(); });
    const rm = chip.querySelector('.rm');
    rm.addEventListener('click', async (e) => {
      e.stopPropagation();
      if(!confirm('Delete this style and all its processes?')) return;
      line.styles = line.styles.filter(s => s.id !== rm.dataset.rm);
      await persistLine(line); ui.activeStyleId = line.styles[0]?line.styles[0].id:null; renderTimeStudy();
    });
  });
  document.getElementById('addStyleBtn').addEventListener('click', async () => {
    const name = prompt('Style name (e.g. Kids T-shirt, Pants, T-shirt w/ Accessories):');
    if(!name || !name.trim()) return;
    const s = { id: uid('S'), name: name.trim(), processes: [] };
    line.styles.push(s); await persistLine(line);
    ui.activeStyleId = s.id; renderTimeStudy();
  });

  const content = document.getElementById('styleContent');
  const style = activeStyle();
  if(!style){ content.innerHTML = '<div class="empty">No styles yet — add one above (e.g. "Kids T-shirt").</div>'; return; }

  const outputProcess = style.processes.find(p => p.useForOutput && p.result);
  let html = '';
  if(outputProcess){
    html += `<div class="output-banner">
      <div class="l">Estimated Final Output</div>
      <div class="v">${outputProcess.result.piecesPerHour.toFixed(0)} <span>pcs/hr</span></div>
      <div class="via">via "${escapeHtml(outputProcess.name)}" — allowed time ${outputProcess.result.allowedTime.toFixed(2)}s/pc</div>
    </div>`;
  } else if(style.processes.length){
    html += `<div class="empty-sm">No process selected for final output yet — run a test below, then mark one "Use for output".</div>`;
  }

  html += `<div id="processList"></div><button class="secondary" id="addProcessBtn" style="width:100%;">+ Add Process</button>`;
  content.innerHTML = html;

  const processList = document.getElementById('processList');
  if(!style.processes.length){
    processList.innerHTML = '<div class="empty-sm">No processes yet for this style.</div>';
  } else {
    processList.innerHTML = style.processes.map(p => renderProcessCard(p, style)).join('');
  }

  document.getElementById('addProcessBtn').addEventListener('click', async () => {
    const name = prompt('Process name (e.g. Attach Collar, Hem Bottom):');
    if(!name || !name.trim()) return;
    style.processes.push({ id: uid('P'), name: name.trim(), tolerance:3, allowancePct:10, readings:[], result:null, useForOutput:false });
    await persistLine(line); renderTimeStudy();
  });

  wireProcessCardEvents(style, line);
}

function renderProcessCard(p, style){
  const r = p.result;
  return `
    <div class="process-card ${p.useForOutput?'selected':''}" data-pid="${p.id}">
      <div class="pc-top">
        <div class="pc-name">${escapeHtml(p.name)}</div>
        <button class="del-btn" data-delp="${p.id}">✕</button>
      </div>
      ${r ? `
      <div class="pc-stats">
        <span>Avg cycle: <b>${r.avgCycleTime.toFixed(2)}s</b></span>
        <span>Allowance: <b>${r.allowancePct}%</b></span>
        <span>Allowed time: <b>${r.allowedTime.toFixed(2)}s</b></span>
        <span>Output: <b>${r.piecesPerHour.toFixed(0)}/hr</b></span>
      </div>` : `<div class="empty-sm" style="padding:4px 0;">Not tested yet.</div>`}
      <div class="pc-actions">
        <button class="secondary" data-testp="${p.id}">${r ? 'Re-test' : 'Run Test'}</button>
        <label class="use-toggle ${p.useForOutput?'active':''}">
          <input type="checkbox" data-usep="${p.id}" ${p.useForOutput?'checked':''} ${!r?'disabled':''}>
          Use for line output
        </label>
      </div>
      <div id="timerSlot-${p.id}"></div>
    </div>`;
}

function wireProcessCardEvents(style, line){
  document.querySelectorAll('[data-delp]').forEach(btn => btn.addEventListener('click', async () => {
    if(!confirm('Delete this process?')) return;
    style.processes = style.processes.filter(p=>p.id!==btn.dataset.delp);
    await persistLine(line); renderTimeStudy();
  }));
  document.querySelectorAll('[data-usep]').forEach(cb => cb.addEventListener('change', async () => {
    const pid = cb.dataset.usep;
    style.processes.forEach(p => p.useForOutput = (p.id === pid) ? cb.checked : false);
    await persistLine(line); renderTimeStudy();
  }));
  document.querySelectorAll('[data-testp]').forEach(btn => btn.addEventListener('click', () => {
    const pid = btn.dataset.testp;
    ui.openTimerProcessId = (ui.openTimerProcessId === pid) ? null : pid;
    stopTimerSession();
    if(ui.openTimerProcessId) openTimerFor(style, line, pid);
    else document.getElementById('timerSlot-'+pid).innerHTML = '';
  }));
}

function openTimerFor(style, line, pid){
  const p = style.processes.find(x=>x.id===pid);
  timerSession = { processId: pid, tolerance: p.tolerance||3, allowancePct: p.allowancePct||10, readings: [], running:false, startedAt:null, lastLapAt:null };
  const slot = document.getElementById('timerSlot-'+pid);
  slot.innerHTML = `
    <div class="timer-box">
      <div class="ts-config">
        <div><label>Tolerance (±sec)</label><input id="tsTolerance" type="number" step="0.1" value="${timerSession.tolerance}"></div>
        <div><label>Allowance %</label><input id="tsAllowance" type="number" step="1" value="${timerSession.allowancePct}"></div>
      </div>
      <div class="timer-display"><div class="t" id="tsDisplay">0.0</div><div class="l">seconds — since last lap</div></div>
      <div class="timer-controls">
        <button class="btn-start" id="tsStart">Start</button>
        <button class="btn-lap" id="tsLap" disabled>Lap / Record</button>
        <button class="btn-stop" id="tsReset">Reset</button>
      </div>
      <div class="running-avg" id="tsAvg">No readings yet.</div>
      <div class="readings-grid" id="tsReadings"></div>
      <button class="primary" id="tsSave" disabled>Save Test</button>
    </div>`;

  document.getElementById('tsTolerance').addEventListener('input', (e) => { timerSession.tolerance = parseFloat(e.target.value)||0; });
  document.getElementById('tsAllowance').addEventListener('input', (e) => { timerSession.allowancePct = parseFloat(e.target.value)||0; });

  document.getElementById('tsStart').addEventListener('click', () => {
    timerSession.running = true; timerSession.startedAt = Date.now(); timerSession.lastLapAt = Date.now();
    document.getElementById('tsLap').disabled = false;
    document.getElementById('tsStart').disabled = true;
    timerInterval = setInterval(() => {
      const el = ((Date.now()-timerSession.lastLapAt)/1000).toFixed(1);
      const disp = document.getElementById('tsDisplay'); if(disp) disp.textContent = el;
    }, 100);
  });

  document.getElementById('tsLap').addEventListener('click', () => {
    if(!timerSession.running) return;
    const now = Date.now();
    const seconds = (now - timerSession.lastLapAt)/1000;
    timerSession.lastLapAt = now;
    const keptSoFar = timerSession.readings.filter(r=>r.kept);
    const runningAvg = keptSoFar.length ? keptSoFar.reduce((s,r)=>s+r.seconds,0)/keptSoFar.length : null;
    let kept = runningAvg===null ? true : Math.abs(seconds-runningAvg) <= timerSession.tolerance;
    if(kept && keptSoFar.length>=10) kept = false; // cap: never auto-keep past 10, extra ones start flagged
    timerSession.readings.push({ id: uid('R'), seconds, kept });
    renderTimerReadings();
  });

  document.getElementById('tsReset').addEventListener('click', () => { stopTimerSession(); openTimerFor(style, line, pid); });

  document.getElementById('tsSave').addEventListener('click', async () => {
    const kept = timerSession.readings.filter(r=>r.kept);
    if(kept.length < 5){ alert(`Keep at least 5 readings before saving (currently ${kept.length}).`); return; }
    if(kept.length > 10){ alert(`Too many kept readings (${kept.length}) — defer some down to 10 or fewer.`); return; }
    const avgCycleTime = kept.reduce((s,r)=>s+r.seconds,0)/kept.length;
    const allowedTime = avgCycleTime * (1 + timerSession.allowancePct/100);
    const piecesPerHour = allowedTime>0 ? 3600/allowedTime : 0;
    const p = style.processes.find(x=>x.id===pid);
    p.tolerance = timerSession.tolerance; p.allowancePct = timerSession.allowancePct;
    p.readings = timerSession.readings;
    p.result = { avgCycleTime, allowancePct: timerSession.allowancePct, allowedTime, piecesPerHour, testedAt: Date.now() };
    await persistLine(line);
    stopTimerSession(); ui.openTimerProcessId = null;
    renderTimeStudy();
  });

  renderTimerReadings();
}

function renderTimerReadings(){
  const grid = document.getElementById('tsReadings'); if(!grid) return;
  grid.innerHTML = timerSession.readings.map((r,i) => `
    <div class="reading-chip ${r.kept?'kept':'outlier'}" data-rid="${r.id}">
      <div class="n">#${i+1}</div><div class="s">${r.seconds.toFixed(1)}</div><div class="tag">${r.kept?'kept':'flagged'}</div>
    </div>`).join('');
  grid.querySelectorAll('.reading-chip').forEach(chip => chip.addEventListener('click', () => {
    const r = timerSession.readings.find(x=>x.id===chip.dataset.rid);
    if(!r.kept){
      const keptCount = timerSession.readings.filter(x=>x.kept).length;
      if(keptCount>=10){ alert('Max 10 kept readings — defer one first before keeping another.'); return; }
    }
    r.kept = !r.kept; renderTimerReadings();
  }));
  const kept = timerSession.readings.filter(r=>r.kept);
  const avg = kept.length ? kept.reduce((s,r)=>s+r.seconds,0)/kept.length : null;
  const avgEl = document.getElementById('tsAvg');
  const rangeOk = kept.length>=5 && kept.length<=10;
  const rangeMsg = kept.length<5 ? `<span style="color:var(--rust);">need ${5-kept.length} more kept</span>`
    : kept.length>10 ? `<span style="color:var(--rust);">defer ${kept.length-10} to save</span>`
    : `<span style="color:var(--teal);">ready to save</span>`;
  avgEl.innerHTML = avg!==null
    ? `${timerSession.readings.length} recorded · ${kept.length} kept (need 5–10) · ${rangeMsg}<br>running avg <b>${avg.toFixed(2)}s</b>`
    : `${timerSession.readings.length} recorded — tap Lap to record a cycle`;
  document.getElementById('tsSave').disabled = !rangeOk;
}

function stopTimerSession(){
  if(timerInterval){ clearInterval(timerInterval); timerInterval=null; }
  timerSession = null;
}

/* ---------- Master render ---------- */
function render(){
  document.getElementById('dayPicker').value = ui.day;
  document.querySelectorAll('.subtab').forEach(b=>b.classList.toggle('active', b.dataset.tab===ui.subtab));
  document.querySelectorAll('.tabpanel').forEach(p=>p.classList.toggle('active', p.id==='tab-'+ui.subtab));
  renderGroupTabs(); renderTabs(); renderConfig(); renderSummary(); renderDowntime(); renderRecent(); renderLog(); renderChart(); updatePreview(); renderTimeStudy();
}

document.getElementById('eTime').value = '08:00';
loadState();

if('serviceWorker' in navigator){
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('/sw.js').catch(e => console.warn('SW registration failed', e));
  });
}

</script>
